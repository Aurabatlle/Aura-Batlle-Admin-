<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: \'Segoe UI\', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --light: #f8f9fa;
            --dark: #212529;
            --danger: #e63946;
            --warning: #fca311;
            --gray: #6c757d;
            --white: #ffffff;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            background: var(--white);
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .login-header {
            background: var(--primary);
            padding: 28px 25px;
            text-align: center;
            color: var(--white);
        }
        
        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .logo img {
            height: 52px;
        }
        
        .login-header p {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 6px;
        }
        
        .login-body {
            padding: 28px 24px 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }
        
        .input-group {
            display: flex;
            align-items: stretch;
            border: 1.5px solid #dde1f0;
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
        }
        
        .input-group-prepend {
            padding: 0 14px;
            background: #f4f6fb;
            display: flex;
            align-items: center;
            border-right: 1.5px solid #dde1f0;
            min-width: 46px;
            justify-content: center;
        }
        
        .input-group-prepend i {
            color: var(--gray);
            font-size: 15px;
        }

        .pw-wrap {
            position: relative;
            flex: 1;
            display: flex;
        }
        
        .form-control {
            flex: 1;
            width: 100%;
            padding: 13px 42px 13px 14px;
            border: none;
            font-size: 16px; /* 16px prevents iOS auto-zoom */
            color: var(--dark);
            background: var(--white);
            -webkit-appearance: none;
        }

        .form-control.no-right-pad {
            padding-right: 14px;
        }
        
        .form-control:focus {
            outline: none;
        }

        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray);
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
            line-height: 1;
        }
        .toggle-pw:hover { color: var(--primary); }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.02em;
        }
        
        .btn-primary {
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(67,97,238,0.35);
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--secondary);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(67,97,238,0.4);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 11px 14px;
            border-radius: 9px;
            margin-bottom: 18px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        
        .alert-danger {
            background: #fdf0f0;
            color: #c0392b;
            border: 1px solid #f5c6cb;
        }
        
        .alert-success {
            background: #edfaf1;
            color: #1a7a3c;
            border: 1px solid #b7e4c7;
        }
        
        .login-footer {
            text-align: center;
            padding: 14px 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: var(--gray);
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            border-top-color: var(--white);
            animation: spin 0.8s linear infinite;
            display: none;
            flex-shrink: 0;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Mobile optimisations ── */
        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding-top: 36px;
            }
            .login-card { border-radius: 14px; }
            .login-header { padding: 22px 18px; }
            .logo img { height: 44px; }
            .login-body { padding: 22px 18px 18px; }
        }

        @media (max-width: 360px) {
            body { padding-top: 16px; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <img src="https://i.imghippo.com/files/JaE9679Nc.png" alt="Company Logo">
                </div>
                <p>Sign in to your account</p>
            </div>
            
            <div class="login-body">
                <div class="alert alert-danger" id="errorMessage"></div>
                <div class="alert alert-success" id="successMessage"></div>
                
                <!-- Username only (no email) -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="text" class="form-control no-right-pad" id="username"
                               placeholder="Enter your username"
                               autocomplete="username"
                               autocorrect="off" autocapitalize="off" spellcheck="false">
                    </div>
                </div>
                
                <!-- Password with show/hide toggle -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <i class="fas fa-lock"></i>
                        </div>
                        <div class="pw-wrap">
                            <input type="password" class="form-control" id="password"
                                   placeholder="Enter your password"
                                   autocomplete="current-password">
                            <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="Toggle password visibility">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <button class="btn btn-primary" id="loginBtn" onclick="loginUser()">
                    <span id="btnText">Login</span>
                    <div class="loader" id="loginLoader"></div>
                </button>
            </div>

            <div class="login-footer">
                🔒 Session expires after 30 minutes
            </div>
        </div>
    </div>

    <script>
        // ── Firebase config ──────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyD7pAsdYqkJzDbSsi8xbLsy2X5s0bgP040",
            authDomain: "aura-battle-main.firebaseapp.com",
            databaseURL: "https://aura-battle-main-default-rtdb.firebaseio.com",
            projectId: "aura-battle-main",
            storageBucket: "aura-battle-main.firebasestorage.app",
            messagingSenderId: "763779990289",
            appId: "1:763779990289:web:5caa7bc861e80b6f0b02b0",
            measurementId: "G-ZZXZ00HK07"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ── Session: 30 minutes ──────────────────────────────────────
        const SESSION_MS = 30 * 60 * 1000;

        // Check existing session on page load
        window.addEventListener(\'DOMContentLoaded\', () => {
            const savedUser = localStorage.getItem(\'adminUsername\');
            const loginTime = parseInt(localStorage.getItem(\'loginTime\') || \'0\');

            if (savedUser && (Date.now() - loginTime) < SESSION_MS) {
                showSuccess(\'Welcome back! Redirecting...\');
                setTimeout(() => { window.location.href = \'dashboard.html\'; }, 1200);
            } else {
                clearSession(); // wipe any expired data
            }
        });

        // ── Allow Enter key on both fields ───────────────────────────
        document.getElementById(\'username\').addEventListener(\'keypress\', e => { if (e.key === \'Enter\') loginUser(); });
        document.getElementById(\'password\').addEventListener(\'keypress\', e => { if (e.key === \'Enter\') loginUser(); });

        // ── Toggle password visibility ────────────────────────────────
        function togglePassword() {
            const input = document.getElementById(\'password\');
            const icon  = document.getElementById(\'eyeIcon\');
            const show  = input.type === \'password\';
            input.type  = show ? \'text\' : \'password\';
            icon.className = show ? \'fas fa-eye-slash\' : \'fas fa-eye\';
        }

        // ── Login ─────────────────────────────────────────────────────
        function loginUser() {
            const username = document.getElementById(\'username\').value.trim();
            const password = document.getElementById(\'password\').value.trim();

            if (!username || !password) {
                showError(\'Please enter both username and password.\');
                return;
            }

            setLoading(true);

            // Search Firebase /admins node for matching username + password
            database.ref(\'admins\').once(\'value\')
                .then(snapshot => {
                    let userFound = false;
                    let userData  = null;

                    snapshot.forEach(child => {
                        const admin = child.val();
                        if (admin.username === username && admin.password === password) {
                            userFound = true;
                            userData  = { ...admin, key: child.key };
                            return true; // break forEach
                        }
                    });

                    if (userFound) {
                        // Save username + timestamp for 30-min session
                        localStorage.setItem(\'adminUsername\', userData.username);
                        localStorage.setItem(\'loginTime\',    Date.now().toString());
                        // Save optional fields if present
                        if (userData.role)  localStorage.setItem(\'adminRole\',  userData.role);
                        if (userData.email) localStorage.setItem(\'adminEmail\', userData.email);

                        showSuccess(\'Login successful! Redirecting...\');
                        setTimeout(() => { window.location.href = \'dashboard.html\'; }, 1200);
                    } else {
                        showError(\'Invalid username or password.\');
                        setLoading(false);
                    }
                })
                .catch(err => {
                    showError(\'Connection error: \' + err.message);
                    setLoading(false);
                });
        }

        // ── Helpers ───────────────────────────────────────────────────
        function setLoading(state) {
            const btn    = document.getElementById(\'loginBtn\');
            const text   = document.getElementById(\'btnText\');
            const loader = document.getElementById(\'loginLoader\');
            btn.disabled         = state;
            text.textContent     = state ? \'Signing in...\' : \'Login\';
            loader.style.display = state ? \'block\' : \'none\';
        }

        function showError(msg) {
            const el = document.getElementById(\'errorMessage\');
            el.innerHTML = \'<i class="fas fa-exclamation-circle"></i> \' + msg;
            el.style.display = \'flex\';
            document.getElementById(\'successMessage\').style.display = \'none\';
            setTimeout(() => { el.style.display = \'none\'; }, 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById(\'successMessage\');
            el.innerHTML = \'<i class="fas fa-check-circle"></i> \' + msg;
            el.style.display = \'flex\';
            document.getElementById(\'errorMessage\').style.display = \'none\';
        }

        function clearSession() {
            [\'adminUsername\', \'adminRole\', \'adminEmail\', \'loginTime\'].forEach(k => localStorage.removeItem(k));
        }
    </script>
</body>
</html>
