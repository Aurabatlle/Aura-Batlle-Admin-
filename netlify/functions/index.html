<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aura Battle — Push Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050508;
      --surface: #0d0d14;
      --surface2: #13131f;
      --border: #1e1e30;
      --accent: #f0c040;
      --accent2: #e05a2b;
      --text: #e8e8f0;
      --muted: #6060a0;
      --success: #2ecc87;
      --error: #ff4757;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 70% 20%, rgba(240,192,64,0.07), transparent),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(224,90,43,0.05), transparent);
      pointer-events: none;
    }
    .wrapper {
      position: relative; z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 0 14px rgba(240,192,64,0.7));
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 12px rgba(240,192,64,0.6)); }
      50%      { filter: drop-shadow(0 0 28px rgba(240,192,64,1)); }
    }
    .logo-title {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      color: var(--accent);
    }
    .logo-sub {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .status-badge {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: var(--success);
      border: 1px solid rgba(46,204,135,0.3);
      padding: 6px 14px;
      border-radius: 4px;
      background: rgba(46,204,135,0.05);
      transition: color 0.3s, border-color 0.3s;
    }
    main {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      animation: fadeUp 0.5s ease both;
    }
    #historyCard { animation-delay: 0.12s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .card-header h2 {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1.05rem;
    }
    .tag {
      font-size: 0.62rem;
      padding: 3px 10px;
      border-radius: 4px;
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.3);
      color: var(--accent);
      letter-spacing: 0.08em;
    }
    .field { margin-bottom: 16px; position: relative; }
    .field.hidden { display: none; }
    label {
      display: block;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .optional { color: #404065; text-transform: none; font-size: 0.62rem; }
    input, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }
    input:focus, textarea:focus {
      border-color: rgba(240,192,64,0.5);
      box-shadow: 0 0 0 3px rgba(240,192,64,0.07);
    }
    input::placeholder, textarea::placeholder { color: #35355a; }
    .char-count {
      position: absolute; right: 10px; bottom: 8px;
      font-size: 0.58rem; color: var(--muted);
    }
    .hint { font-size: 0.62rem; color: var(--muted); margin-top: 5px; display: block; }
    .toggle-group { display: flex; gap: 8px; }
    .toggle-btn {
      flex: 1; padding: 9px;
      font-family: var(--font-mono); font-size: 0.72rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn.active {
      border-color: rgba(240,192,64,0.5);
      background: rgba(240,192,64,0.08);
      color: var(--accent);
    }
    .send-btn {
      width: 100%; margin-top: 10px; padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #050508;
      font-family: var(--font-head); font-weight: 700;
      font-size: 0.95rem; letter-spacing: 0.05em;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .send-btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-loader {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.25);
      border-top-color: #050508;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-box {
      margin-top: 14px; padding: 13px;
      border-radius: 8px;
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.76rem; line-height: 1.5;
      word-break: break-all;
    }
    .result-box.hidden { display: none; }
    .result-box.success { background: rgba(46,204,135,0.08); border: 1px solid rgba(46,204,135,0.25); color: var(--success); }
    .result-box.error   { background: rgba(255,71,87,0.08);  border: 1px solid rgba(255,71,87,0.25);  color: var(--error); }
    .result-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .clear-btn {
      font-family: var(--font-mono); font-size: 0.62rem;
      color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 10px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .clear-btn:hover { color: var(--error); border-color: var(--error); }
    .empty-state { color: var(--muted); font-size: 0.72rem; text-align: center; padding: 32px 0; }
    .history-item {
      padding: 12px 0; border-bottom: 1px solid var(--border);
      animation: fadeUp 0.3s ease both;
    }
    .history-item:last-child { border-bottom: none; }
    .history-status { font-size: 0.62rem; letter-spacing: 0.08em; margin-bottom: 4px; }
    .history-status.ok  { color: var(--success); }
    .history-status.err { color: var(--error); }
    .history-title { font-family: var(--font-head); font-weight: 700; font-size: 0.83rem; margin-bottom: 2px; }
    .history-body  { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-time  { font-size: 0.58rem; color: #404060; margin-top: 4px; }
    footer {
      display: flex; justify-content: space-between;
      margin-top: 40px; padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.62rem; color: #404060; letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="wrapper">
  <header>
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <div>
        <div class="logo-title">AURA BATTLE</div>
        <div class="logo-sub">Push Notification Panel</div>
      </div>
    </div>
    <div class="status-badge" id="statusBadge">● READY</div>
  </header>

  <main>
    <!-- Send Card -->
    <section class="card">
      <div class="card-header">
        <h2>Send Notification</h2>
        <span class="tag">FCM v1</span>
      </div>

      <div class="field">
        <label>Send Mode</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="modeDevice" onclick="setMode('device')">📱 Device Token</button>
          <button class="toggle-btn" id="modeTopic" onclick="setMode('topic')">📡 Topic</button>
        </div>
      </div>

      <div class="field" id="tokenField">
        <label for="fcmToken">FCM Device Token</label>
        <textarea id="fcmToken" rows="3" placeholder="Paste the device FCM token here..."></textarea>
      </div>

      <div class="field hidden" id="topicField">
        <label for="fcmTopic">Topic Name</label>
        <input type="text" id="fcmTopic" placeholder="e.g. all, premium_users"/>
        <span class="hint">Sends to /topics/{name}</span>
      </div>

      <div class="field">
        <label for="notifTitle">Title</label>
        <input type="text" id="notifTitle" placeholder="e.g. New Aura Battle!" maxlength="100"/>
        <span class="char-count" id="titleCount">0/100</span>
      </div>

      <div class="field">
        <label for="notifBody">Message</label>
        <textarea id="notifBody" rows="4" placeholder="Your notification message..." maxlength="500"></textarea>
        <span class="char-count" id="bodyCount">0/500</span>
      </div>

      <div class="field">
        <label for="notifImage">Image URL <span class="optional">optional</span></label>
        <input type="url" id="notifImage" placeholder="https://example.com/image.png"/>
      </div>

      <div class="field">
        <label for="notifData">Custom Data JSON <span class="optional">optional</span></label>
        <input type="text" id="notifData" placeholder='{"screen":"battle","id":"123"}'/>
      </div>

      <button class="send-btn" id="sendBtn" onclick="sendPush()">
        <span id="btnText">⚡ Send Push Notification</span>
        <div class="btn-loader hidden" id="btnLoader"></div>
      </button>

      <div class="result-box hidden" id="resultBox">
        <div class="result-icon" id="resultIcon"></div>
        <div id="resultText"></div>
      </div>
    </section>

    <!-- History Card -->
    <section class="card" id="historyCard">
      <div class="card-header">
        <h2>Send History</h2>
        <button class="clear-btn" onclick="clearHistory()">Clear All</button>
      </div>
      <div id="historyList">
        <div class="empty-state">No notifications sent yet.</div>
      </div>
    </section>
  </main>

  <footer>
    <span>Aura Battle Push Panel · aura-battle-main</span>
    <span>Firebase Cloud Messaging HTTP v1</span>
  </footer>
</div>

<script>
  let currentMode = 'device';
  let sendHistory = JSON.parse(localStorage.getItem('ab_push_history') || '[]');
  renderHistory();

  document.getElementById('notifTitle').addEventListener('input', function() {
    document.getElementById('titleCount').textContent = this.value.length + '/100';
  });
  document.getElementById('notifBody').addEventListener('input', function() {
    document.getElementById('bodyCount').textContent = this.value.length + '/500';
  });

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('tokenField').classList.toggle('hidden', mode !== 'device');
    document.getElementById('topicField').classList.toggle('hidden', mode !== 'topic');
    document.getElementById('modeDevice').classList.toggle('active', mode === 'device');
    document.getElementById('modeTopic').classList.toggle('active', mode === 'topic');
  }

  async function sendPush() {
    const title   = document.getElementById('notifTitle').value.trim();
    const body    = document.getElementById('notifBody').value.trim();
    const image   = document.getElementById('notifImage').value.trim();
    const dataRaw = document.getElementById('notifData').value.trim();
    const btn     = document.getElementById('sendBtn');

    let target;
    if (currentMode === 'device') {
      target = document.getElementById('fcmToken').value.trim();
      if (!target) return showResult('error', '❌', 'Please enter a device FCM token.');
    } else {
      const topic = document.getElementById('fcmTopic').value.trim();
      if (!topic) return showResult('error', '❌', 'Please enter a topic name.');
      target = '/topics/' + topic;
    }

    if (!title) return showResult('error', '❌', 'Title is required.');
    if (!body)  return showResult('error', '❌', 'Message body is required.');

    let customData = {};
    if (dataRaw) {
      try { customData = JSON.parse(dataRaw); }
      catch(e) { return showResult('error', '❌', 'Custom Data JSON is invalid.'); }
    }

    setLoading(true);
    hideResult();
    setBadge('SENDING...', '#f0c040');

    try {
      const res = await fetch('/.netlify/functions/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target, title, body, image, data: customData })
      });

      const result = await res.json();

      if (res.ok && result.success) {
        showResult('success', '✅', 'Sent! Message ID: ' + (result.messageId || 'OK'));
        addHistory(true, title, body);
        setBadge('● READY', '#2ecc87');
      } else {
        const msg = result.error?.message || result.error || JSON.stringify(result);
        showResult('error', '❌', 'Failed: ' + msg);
        addHistory(false, title, body);
        setBadge('● ERROR', '#ff4757');
        setTimeout(() => setBadge('● READY', '#2ecc87'), 3000);
      }
    } catch (err) {
      showResult('error', '❌', 'Network error: ' + err.message);
      setBadge('● ERROR', '#ff4757');
      setTimeout(() => setBadge('● READY', '#2ecc87'), 3000);
    }

    setLoading(false);
  }

  function setLoading(on) {
    const btn = document.getElementById('sendBtn');
    document.getElementById('btnText').classList.toggle('hidden', on);
    document.getElementById('btnLoader').classList.toggle('hidden', !on);
    btn.disabled = on;
  }

  function showResult(type, icon, text) {
    const box = document.getElementById('resultBox');
    box.className = 'result-box ' + type;
    document.getElementById('resultIcon').textContent = icon;
    document.getElementById('resultText').textContent = text;
  }

  function hideResult() {
    document.getElementById('resultBox').className = 'result-box hidden';
  }

  function setBadge(text, color) {
    const b = document.getElementById('statusBadge');
    b.textContent = text;
    b.style.color = color;
    b.style.borderColor = color + '55';
  }

  function addHistory(success, title, body) {
    sendHistory.unshift({ success, title, body, time: new Date().toLocaleString() });
    if (sendHistory.length > 30) sendHistory.pop();
    localStorage.setItem('ab_push_history', JSON.stringify(sendHistory));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!sendHistory.length) {
      list.innerHTML = '<div class="empty-state">No notifications sent yet.</div>';
      return;
    }
    list.innerHTML = sendHistory.map(h => `
      <div class="history-item">
        <div class="history-status ${h.success ? 'ok' : 'err'}">${h.success ? '● SENT' : '● FAILED'}</div>
        <div class="history-title">${esc(h.title)}</div>
        <div class="history-body">${esc(h.body)}</div>
        <div class="history-time">${h.time}</div>
      </div>
    `).join('');
  }

  function clearHistory() {
    sendHistory = [];
    localStorage.removeItem('ab_push_history');
    renderHistory();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
