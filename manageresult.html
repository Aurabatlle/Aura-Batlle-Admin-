<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin — Match Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --red:#e63946;--red-dark:#b5202d;
            --gold:#f5c518;--gold-dark:#c9a000;
            --green:#22c55e;--green-dark:#16a34a;
            --purple:#8b5cf6;
            --orange:#f97316;
            --blue:#3b82f6;
            --bg:#0d0d0f;--surface:#141418;--surface2:#1a1a1f;--surface3:#1f1f25;
            --border:rgba(255,255,255,0.07);--border-red:rgba(230,57,70,0.2);
            --text:#f0f0f2;--dim:#9898a8;--muted:#5a5a68;
        }
        html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(139,92,246,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,0.02) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}

        /* ── Header ── */
        .header{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:12px;padding:13px 18px;background:rgba(13,13,15,0.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
        .back-btn{width:34px;height:34px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--dim);font-size:14px;flex-shrink:0;}
        .h-logo{width:30px;height:30px;border-radius:8px;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .h-logo i{color:var(--purple);font-size:13px;}
        .h-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;flex:1;}
        .h-title span{color:var(--purple);}
        .h-pill{padding:3px 10px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:20px;font-size:10px;color:var(--purple);letter-spacing:1px;font-weight:600;text-transform:uppercase;}

        /* ── Tabs ── */
        .tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:190;}
        .tab{flex:1;padding:13px 8px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;position:relative;white-space:nowrap;}
        .tab.active{color:var(--purple);border-bottom-color:var(--purple);}
        .tab-badge{position:absolute;top:8px;right:12px;background:var(--purple);color:#fff;font-size:9px;font-family:'DM Sans',sans-serif;font-weight:600;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;}

        /* ── Main ── */
        .main{padding:16px;max-width:680px;margin:0 auto;position:relative;z-index:1;padding-bottom:40px;}
        .tab-content{display:none;}
        .tab-content.active{display:block;animation:fadeUp .3s ease both;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        /* ── Search ── */
        .search-bar{margin-bottom:14px;}
        .search-bar input{width:100%;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
        .search-bar input:focus{border-color:rgba(139,92,246,.5);}
        .search-bar input::placeholder{color:var(--muted);}

        /* ── Match Card ── */
        .match-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:16px;transition:border-color .2s;}
        .match-card:hover{border-color:rgba(139,92,246,0.22);}
        .mc-stripe{height:3px;}
        .mc-stripe.result_pending{background:linear-gradient(90deg,#f97316,#f5c518);animation:stripePulse 2s ease-in-out infinite;}
        .mc-stripe.completed{background:linear-gradient(90deg,var(--purple),#a78bfa);}
        @keyframes stripePulse{0%,100%{opacity:.7}50%{opacity:1}}

        .mc-head{padding:13px 16px 4px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
        .mc-id{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--purple);letter-spacing:2px;}
        .mc-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:5px;}
        .mc-status.result_pending{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.3);}
        .mc-status.completed{background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.25);}

        .mc-hoster{display:flex;align-items:center;gap:6px;padding:3px 16px 0;font-size:11px;color:var(--muted);}
        .mc-hoster i{color:var(--purple);font-size:10px;}
        .mc-hoster span{color:var(--purple);font-weight:600;}

        .mc-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--text);padding:5px 16px 4px;}
        .mc-dt{display:flex;align-items:center;gap:6px;padding:0 16px 10px;font-size:12px;color:var(--dim);}
        .mc-dt i{color:var(--muted);font-size:11px;}

        /* info row */
        .mc-info-row{display:flex;gap:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:0;}
        .mc-info-cell{flex:1;padding:9px 4px;text-align:center;border-right:1px solid var(--border);}
        .mc-info-cell:last-child{border-right:none;}
        .mc-info-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:3px;}
        .mc-info-lbl i{font-size:9px;}
        .mc-info-val{font-size:12px;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:1px;color:var(--text);}
        .mc-info-val.red{color:var(--red);}
        .mc-info-val.gold{color:var(--gold);}
        .mc-info-val.green{color:var(--green);}
        .mc-info-val.purple{color:var(--purple);}
        .mc-info-val.orange{color:var(--orange);}

        /* prize info box */
        .prize-box{margin:10px 16px 0;background:var(--surface2);border:1px solid rgba(245,197,24,.15);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
        .prize-box-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:6px;}
        .prize-box-label i{color:var(--gold);font-size:12px;}
        .prize-box-val{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--gold);}

        /* actions */
        .mc-actions{padding:12px 16px 14px;display:flex;flex-wrap:wrap;gap:8px;}
        .mc-btn{flex:1;min-width:100px;padding:10px 8px;border-radius:10px;border:none;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .2s,transform .1s;}
        .mc-btn:active{transform:scale(.97);}
        .btn-players{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--border);}
        .btn-results{background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.25);}

        /* pending notice */
        .pending-notice{margin:10px 16px 14px;display:flex;align-items:center;gap:10px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);border-radius:10px;padding:10px 14px;font-size:12px;color:#f97316;}
        .pending-notice i{font-size:14px;flex-shrink:0;}

        /* ── Skeleton & Empty ── */
        .skeleton{background:var(--surface2);border-radius:18px;height:200px;margin-bottom:14px;animation:skpulse 1.5s ease infinite;}
        @keyframes skpulse{0%,100%{opacity:.4}50%{opacity:.7}}
        .empty-state{text-align:center;padding:60px 20px;}
        .empty-icon{font-size:48px;margin-bottom:14px;opacity:.4;}
        .empty-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--dim);margin-bottom:6px;}
        .empty-sub{font-size:13px;color:var(--muted);}

        /* ── Full-screen Players Panel ── */
        .fs-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:600;flex-direction:column;overflow:hidden;}
        .fs-overlay.show{display:flex;animation:fsFadeIn .25s ease both;}
        @keyframes fsFadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        .fs-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(13,13,15,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(14px);flex-shrink:0;}
        .fs-back{width:36px;height:36px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:15px;cursor:pointer;flex-shrink:0;}
        .fs-title-block{flex:1;min-width:0;}
        .fs-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .fs-sub{font-size:11px;color:var(--muted);margin-top:2px;}
        .fs-count-badge{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.35);color:var(--purple);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:1px;white-space:nowrap;}

        /* panel inner tabs */
        .fs-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
        .fs-tab{flex:1;padding:12px 8px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
        .fs-tab.active{color:var(--purple);border-bottom-color:var(--purple);}

        .fs-body{flex:1;overflow-y:auto;padding:16px;}
        .fs-body::-webkit-scrollbar{width:3px;}
        .fs-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

        /* ── Players list rows (panel) ── */
        .fsp-item{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:12px;padding:11px 14px;margin-bottom:8px;border:1px solid var(--border);}
        .fsp-num{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--muted);width:26px;text-align:center;flex-shrink:0;}
        .fsp-avatar{width:36px;height:36px;border-radius:50%;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--purple);flex-shrink:0;}
        .fsp-info{flex:1;min-width:0;}
        .fsp-ign{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.5px;}
        .fsp-uid{font-size:11px;color:#7878a8;font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-top:3px;display:flex;align-items:center;gap:4px;}
        .fsp-uid-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
        .fsp-winner-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap;flex-shrink:0;}
        .fsp-winner-badge.winner{background:rgba(245,197,24,.15);color:var(--gold);border:1px solid rgba(245,197,24,.3);}
        .fsp-winner-badge.top{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}

        /* BR team cards */
        .fst-card{background:var(--surface2);border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);}
        .fst-header{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(139,92,246,.07);border-bottom:1px solid var(--border);}
        .fst-num{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);background:var(--surface3);border:1px solid var(--border);padding:2px 9px;border-radius:8px;flex-shrink:0;}
        .fst-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--text);flex:1;}
        .fst-leader{font-size:10px;color:#7878a8;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;background:var(--surface3);border:1px solid var(--border);padding:2px 8px;border-radius:6px;flex-shrink:0;}
        .fst-members{padding:10px 14px 12px;display:flex;flex-direction:column;gap:7px;}
        .fst-member-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface3);border-radius:9px;}
        .fst-spot{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:6px;flex-shrink:0;}
        .fst-ign{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.5px;flex:1;}
        .fst-uid{font-size:10px;color:#7878a8;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:6px;flex-shrink:0;}

        /* CS/LW slot cards */
        .fss-card{background:var(--surface2);border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);}
        .fss-header{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(230,57,70,.07);border-bottom:1px solid var(--border);}
        .fss-team-lbl{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--red);}
        .fss-count{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--muted);flex:1;}
        .fss-multi{font-size:10px;color:var(--gold);background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.25);padding:2px 9px;border-radius:10px;}
        .fss-rows{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px;}
        .fss-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface3);border-radius:9px;}
        .fss-spot{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--red);width:30px;flex-shrink:0;}
        .fss-ign{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--gold);flex:1;}
        .fss-uid{font-size:10px;color:#7878a8;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:6px;flex-shrink:0;}

        /* ── Results panel ── */
        .res-summary{background:var(--surface2);border-radius:14px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--border);}
        .res-summary-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
        .res-summary-title::after{content:'';flex:1;height:1px;background:var(--border);}
        .res-prize-chips{display:flex;flex-wrap:wrap;gap:8px;}
        .res-prize-chip{display:flex;align-items:center;gap:6px;background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:7px 12px;}
        .res-prize-chip i{font-size:11px;}
        .res-prize-chip.kill-chip i{color:var(--red);}
        .res-prize-chip.rank-chip i{color:var(--gold);}
        .res-prize-chip.winner-chip i{color:var(--purple);}
        .res-prize-chip-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
        .res-prize-chip-val{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text);}

        /* result row */
        .res-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:12px;margin-bottom:7px;border:1px solid var(--border);position:relative;overflow:hidden;}
        .res-row.is-winner{border-color:rgba(245,197,24,.3);background:linear-gradient(135deg,rgba(245,197,24,.06),rgba(245,197,24,.02));}
        .res-row.is-winner::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);}
        .res-rank{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--muted);width:32px;text-align:center;flex-shrink:0;}
        .res-rank.rank-1{color:var(--gold);}
        .res-rank.rank-2{color:#94a3b8;}
        .res-rank.rank-3{color:#b45309;}
        .res-info{flex:1;min-width:0;}
        .res-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--text);letter-spacing:.5px;}
        .res-uid{font-size:10px;color:#7878a8;font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-top:2px;}
        .res-stats{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
        .res-gold{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:4px;}
        .res-gold i{font-size:11px;}
        .res-kills{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
        .res-kills i{font-size:10px;color:var(--red);}
        .res-spots-badge{font-size:10px;color:var(--dim);background:var(--surface3);border:1px solid var(--border);padding:2px 7px;border-radius:6px;}

        /* empty result */
        .res-empty{text-align:center;padding:36px 20px;color:var(--muted);}
        .res-empty i{font-size:32px;opacity:.25;display:block;margin-bottom:10px;}
        .res-empty p{font-size:13px;}

        /* Toast */
        .toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 18px;font-size:13px;z-index:999;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .toast.error{border-color:rgba(230,57,70,.45);color:#ff8a91;}
        .toast.success{border-color:rgba(34,197,94,.45);color:#4ade80;}
        .toast.info{border-color:rgba(139,92,246,.45);color:#c4b5fd;}
    </style>
</head>
<body>

<div class="header">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div class="h-logo"><i class="fas fa-trophy"></i></div>
    <div class="h-title">Aura <span>Battle</span> — Admin</div>
    <div class="h-pill">Results</div>
</div>

<div class="tab-bar">
    <div class="tab active" id="tab-pending"   onclick="switchTab('pending')">🕐 Pending<span class="tab-badge" id="badge-pending">0</span></div>
    <div class="tab"        id="tab-completed" onclick="switchTab('completed')">✅ Completed<span class="tab-badge" id="badge-completed">0</span></div>
</div>

<div class="main">
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍  Search by title, match ID or hoster…" oninput="applySearch()">
    </div>

    <!-- Pending tab -->
    <div class="tab-content active" id="content-pending">
        <div id="list-pending">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </div>

    <!-- Completed tab -->
    <div class="tab-content" id="content-completed">
        <div id="list-completed"></div>
    </div>
</div>

<!-- ══ Full-Screen Players Panel ══ -->
<div class="fs-overlay" id="playersPanel">
    <div class="fs-header">
        <button class="fs-back" onclick="closePanel()"><i class="fas fa-arrow-left"></i></button>
        <div class="fs-title-block">
            <div class="fs-title" id="panelTitle">Players</div>
            <div class="fs-sub"   id="panelSub"></div>
        </div>
        <div class="fs-count-badge" id="panelCount">—</div>
    </div>
    <!-- tabs for CS/LW only -->
    <div class="fs-tabs" id="panelTabs" style="display:none;">
        <div class="fs-tab active" id="fsTab-all"   onclick="fsSwitchTab('all')">All Teams</div>
        <div class="fs-tab"        id="fsTab-team1" onclick="fsSwitchTab('team1')">Team 1</div>
        <div class="fs-tab"        id="fsTab-team2" onclick="fsSwitchTab('team2')">Team 2</div>
    </div>
    <div class="fs-body" id="panelBody">
        <div style="text-align:center;padding:60px;color:var(--muted);">Loading…</div>
    </div>
</div>

<!-- ══ Full-Screen Results Panel ══ -->
<div class="fs-overlay" id="resultsPanel">
    <div class="fs-header">
        <button class="fs-back" onclick="closeResultsPanel()"><i class="fas fa-arrow-left"></i></button>
        <div class="fs-title-block">
            <div class="fs-title" id="resPanelTitle">Results</div>
            <div class="fs-sub"   id="resPanelSub"></div>
        </div>
        <div class="fs-count-badge" id="resPanelCount">—</div>
    </div>
    <!-- inner tabs: Results | Players -->
    <div class="fs-tabs">
        <div class="fs-tab active" id="resTab-results"  onclick="resSwitchTab('results')"><i class="fas fa-trophy" style="font-size:11px;margin-right:4px;"></i>Winners</div>
        <div class="fs-tab"        id="resTab-players"  onclick="resSwitchTab('players')"><i class="fas fa-users"  style="font-size:11px;margin-right:4px;"></i>All Players</div>
    </div>
    <div class="fs-body" id="resPanelBody">
        <div style="text-align:center;padding:60px;color:var(--muted);">Loading…</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
(function(){
'use strict';

firebase.initializeApp(_cfg);
const db = firebase.database();

// ── Admin session ─────────────────────────────────────────────────────────────
const SESSION_MS = 30 * 60 * 1000;
function getAdminSession(){
    const key  = localStorage.getItem('adminUsername');
    const time = parseInt(localStorage.getItem('loginTime') || '0');
    if(!key || (Date.now() - time) >= SESSION_MS) return null;
    return { id: key };
}
if(!getAdminSession()){ window.location.href = 'index.html'; }
setInterval(() => { if(!getAdminSession()) window.location.href = 'index.html'; }, 30000);

// ── State ─────────────────────────────────────────────────────────────────────
let allMatches  = {};   // firebaseKey → match
let currentTab  = 'pending';
let searchQuery = '';

// panel state
let _panelMatchId='', _panelMatchType='', _panelEntryType='';
let _panelSlotsSnap=null, _panelTeamsSnap=null, _panelPlayersSnap=null;
let _resCurMatchId='', _resCurMatch=null, _resActiveTab='results';

// ── Tabs ──────────────────────────────────────────────────────────────────────
window.switchTab = function(tab){
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('content-'+tab).classList.add('active');
    renderAll();
};

// ── Load ──────────────────────────────────────────────────────────────────────
db.ref('matches').on('value', snap => {
    allMatches = {};
    if(snap.exists()){
        snap.forEach(child => {
            allMatches[child.key] = { ...child.val(), _key: child.key };
        });
    }
    renderAll();
    updateBadges();
});

function updateBadges(){
    let pending = 0, completed = 0;
    Object.values(allMatches).forEach(m => {
        if(m.status === 'result_pending') pending++;
        if(m.status === 'completed')      completed++;
    });
    document.getElementById('badge-pending').textContent   = pending;
    document.getElementById('badge-completed').textContent = completed;
}

window.applySearch = function(){
    searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
    renderAll();
};

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){
    const statusMap = { pending: 'result_pending', completed: 'completed' };
    ['pending','completed'].forEach(tab => {
        let matches = Object.values(allMatches).filter(m => m.status === statusMap[tab]);
        if(searchQuery){
            matches = matches.filter(m =>
                (m.title||'').toLowerCase().includes(searchQuery) ||
                (m.matchId||'').toLowerCase().includes(searchQuery) ||
                (m.hosterUsername||'').toLowerCase().includes(searchQuery)
            );
        }
        // sort: newest date first
        matches.sort((a,b) => {
            const ta = new Date((a.date||'0000-01-01')+'T'+(a.time||'00:00')).getTime();
            const tb = new Date((b.date||'0000-01-01')+'T'+(b.time||'00:00')).getTime();
            return tb - ta;
        });

        const el = document.getElementById('list-'+tab);
        if(!el) return;
        if(!matches.length){
            const msgs = { pending:'No matches awaiting results', completed:'No completed matches yet' };
            el.innerHTML = `<div class="empty-state">
                <div class="empty-icon">${tab==='pending'?'🕐':'🏆'}</div>
                <div class="empty-title">${msgs[tab]}</div>
                <div class="empty-sub">${tab==='pending'?'Matches set to Result Pending will appear here.':'Completed matches with results will appear here.'}</div>
            </div>`;
            return;
        }
        el.innerHTML = matches.map(m => buildCard(m, tab)).join('');
    });
}

// ── Build card ────────────────────────────────────────────────────────────────
function buildCard(m, tab){
    const isSolo    = (m.entryType||'').toLowerCase() === 'solo';
    const isCSorLW  = m.matchType === 'CS' || m.matchType === 'LW';
    const feeText   = (m.entryMode === 'free' || !m.entryFee) ? '🆓 Free' : `🪙 ${m.entryFee}`;
    const feeClass  = (m.entryMode === 'free' || !m.entryFee) ? 'green' : 'gold';
    const dtText    = m.date ? fmtDate(m.date, m.time) : '';
    const statusLabel = tab === 'pending' ? '🕐 Result Pending' : '✅ Completed';

    // Prize display
    let prizeHtml = '';
    if(m.prizeType === 'kill' && m.perKillGold){
        prizeHtml = `<div class="prize-box">
            <div class="prize-box-label"><i class="fas fa-crosshairs"></i> Per Kill</div>
            <div class="prize-box-val">🪙 ${m.perKillGold} Gold</div>
        </div>`;
    } else if(m.prizeType === 'rank' && m.rankPrizes?.length){
        const top3 = (m.rankPrizes||[]).slice(0,3).map(p=>`<span style="font-size:11px;color:var(--muted);">🏆 #${p.rank} <span style="color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700;">${p.gold}G</span></span>`).join(' · ');
        prizeHtml = `<div class="prize-box"><div class="prize-box-label"><i class="fas fa-trophy"></i> Rank Prizes</div><div style="display:flex;gap:8px;flex-wrap:wrap;">${top3}</div></div>`;
    } else if(m.prizeType === 'winner_only' && m.winnerPrizePool){
        prizeHtml = `<div class="prize-box">
            <div class="prize-box-label"><i class="fas fa-crown"></i> Winner Pool</div>
            <div class="prize-box-val">🪙 ${m.winnerPrizePool} Gold</div>
        </div>`;
    }

    const pendingNotice = tab === 'pending' ? `
        <div class="pending-notice">
            <i class="fas fa-clock"></i>
            <span>Result not submitted yet — view only. Use the host page to submit results.</span>
        </div>` : '';

    const actionBtns = tab === 'pending'
        ? `<button class="mc-btn btn-players" onclick="openPlayersPanel('${m.matchId}','${esc(m.title||'')}','${esc(m.entryType||'')}','${esc(m.matchType||'')}')"><i class="fas fa-users"></i> ${isCSorLW?'Slots':isSolo?'Players':'Teams'}</button>`
        : `<button class="mc-btn btn-players" onclick="openPlayersPanel('${m.matchId}','${esc(m.title||'')}','${esc(m.entryType||'')}','${esc(m.matchType||'')}')"><i class="fas fa-users"></i> ${isCSorLW?'Slots':isSolo?'Players':'Teams'}</button>
           <button class="mc-btn btn-results" onclick="openResultsPanel('${m._key}')"><i class="fas fa-trophy"></i> View Results</button>`;

    return `
    <div class="match-card" id="card-${m.matchId}">
        <div class="mc-stripe ${m.status}"></div>
        <div class="mc-head">
            <div class="mc-id">#${esc(m.matchId)}</div>
            <span class="mc-status ${m.status}">${statusLabel}</span>
        </div>
        <div class="mc-hoster"><i class="fas fa-user-tie"></i> Hosted by <span>${esc(m.hosterUsername||'Unknown')}</span></div>
        <div class="mc-title">${esc(m.title||'Untitled')}</div>
        ${dtText ? `<div class="mc-dt"><i class="far fa-clock"></i> ${dtText}</div>` : ''}
        <div class="mc-info-row">
            <div class="mc-info-cell">
                <div class="mc-info-lbl"><i class="fas fa-gamepad"></i> Mode</div>
                <div class="mc-info-val red">${esc(m.matchType||'—')}</div>
            </div>
            <div class="mc-info-cell">
                <div class="mc-info-lbl"><i class="fas fa-users"></i> Type</div>
                <div class="mc-info-val">${esc(m.entryType||'—')}</div>
            </div>
            <div class="mc-info-cell">
                <div class="mc-info-lbl"><i class="fas fa-map-marker-alt"></i> Map</div>
                <div class="mc-info-val">${esc(m.map||'—')}</div>
            </div>
            <div class="mc-info-cell">
                <div class="mc-info-lbl"><i class="fas fa-coins"></i> Entry</div>
                <div class="mc-info-val ${feeClass}">${feeText}</div>
            </div>
            <div class="mc-info-cell">
                <div class="mc-info-lbl"><i class="fas fa-bullseye"></i> Spots</div>
                <div class="mc-info-val">${esc(String(m.spots||'—'))}</div>
            </div>
        </div>
        <div style="padding:0 0 0;">${prizeHtml}</div>
        ${pendingNotice}
        <div style="height:1px;background:var(--border);margin:0 16px;"></div>
        <div class="mc-actions">${actionBtns}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// ── Players full-screen panel (all 3 modes) ────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
window.openPlayersPanel = function(matchId, title, entryType, matchType){
    _panelMatchId   = matchId;
    _panelEntryType = entryType;
    _panelMatchType = matchType || '';
    const isCSorLW  = _panelMatchType === 'CS' || _panelMatchType === 'LW';
    const isSolo    = (entryType||'').toLowerCase() === 'solo';

    document.getElementById('panelTitle').textContent   = `${isCSorLW?'⚔️':isSolo?'👥':'⚔️'} ${title}`;
    document.getElementById('panelSub').textContent     = isCSorLW ? 'CS/LW Slot Teams' : isSolo ? 'Solo Players' : 'BR Teams';
    document.getElementById('panelBody').innerHTML      = '<div style="text-align:center;padding:60px;color:var(--muted);">Loading…</div>';
    document.getElementById('panelCount').textContent   = '…';
    document.getElementById('panelTabs').style.display  = isCSorLW ? 'flex' : 'none';

    ['all','team1','team2'].forEach(t => document.getElementById('fsTab-'+t)?.classList.remove('active'));
    document.getElementById('fsTab-all')?.classList.add('active');

    document.getElementById('playersPanel').classList.add('show');
    document.body.style.overflow = 'hidden';

    if(isCSorLW){
        db.ref(`matches/${matchId}/slots`).once('value', snap => {
            _panelSlotsSnap = snap; renderPanelCSLW('all');
        });
    } else if(isSolo){
        db.ref(`matches/${matchId}/players`).once('value', snap => {
            _panelPlayersSnap = snap; renderPanelSolo();
        });
    } else {
        db.ref(`matches/${matchId}/teams`).once('value', snap => {
            _panelTeamsSnap = snap; renderPanelBR();
        });
    }
};

window.closePanel = function(){
    document.getElementById('playersPanel').classList.remove('show');
    document.body.style.overflow = '';
};

window.fsSwitchTab = function(tab){
    ['all','team1','team2'].forEach(t => document.getElementById('fsTab-'+t)?.classList.remove('active'));
    document.getElementById('fsTab-'+tab)?.classList.add('active');
    renderPanelCSLW(tab);
};

// Solo
function renderPanelSolo(){
    const body = document.getElementById('panelBody');
    const snap = _panelPlayersSnap;
    if(!snap || !snap.exists() || !snap.hasChildren()){
        body.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">No players joined yet.</div>';
        document.getElementById('panelCount').textContent = '0 players';
        return;
    }
    const players = []; snap.forEach(c => players.push(c.val()));
    document.getElementById('panelCount').textContent = players.length + ' player' + (players.length !== 1 ? 's' : '');
    body.innerHTML = players.map((p, i) => `
        <div class="fsp-item">
            <div class="fsp-num">${i+1}</div>
            <div class="fsp-avatar">${(p.inGameName||'?').charAt(0).toUpperCase()}</div>
            <div class="fsp-info">
                <div class="fsp-ign">🎮 ${esc(p.inGameName||'—')}</div>
                <div class="fsp-uid"><span class="fsp-uid-lbl">UID</span> ${esc(p.userId||'—')}</div>
            </div>
        </div>`).join('');
}

// BR Multi
function renderPanelBR(){
    const body = document.getElementById('panelBody');
    const snap = _panelTeamsSnap;
    if(!snap || !snap.exists() || !snap.hasChildren()){
        body.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">No teams joined yet.</div>';
        document.getElementById('panelCount').textContent = '0';
        return;
    }
    let html = '', totalPlayers = 0;
    snap.forEach(child => {
        const t        = child.val();
        const tKey     = child.key;
        const tName    = t.teamName || 'Unnamed Team';
        const leaderId = t.leaderId || '—';
        const members  = t.members  || {};
        const spots    = Object.keys(members).sort((a,b) => Number(a) - Number(b));
        totalPlayers  += spots.length;

        const memberRows = spots.map(sn => `
            <div class="fst-member-row">
                <span class="fst-spot">P${sn}</span>
                <span class="fst-ign">🎮 ${esc(members[sn]||'—')}</span>
                ${sn === '1'
                    ? `<span class="fst-uid">${esc(leaderId)}</span>`
                    : `<span style="font-size:10px;color:var(--muted);font-family:'Rajdhani',sans-serif;padding:2px 8px;flex-shrink:0;">member</span>`}
            </div>`).join('');

        html += `
        <div class="fst-card">
            <div class="fst-header">
                <span class="fst-num">Team #${esc(tKey)}</span>
                <span class="fst-name">${esc(tName)}</span>
                <span class="fst-leader" title="Leader UID">${esc(leaderId)}</span>
            </div>
            <div class="fst-members">${memberRows || '<div style="padding:10px;color:var(--muted);font-size:13px;">No members</div>'}</div>
        </div>`;
    });
    document.getElementById('panelCount').textContent = totalPlayers + ' players';
    body.innerHTML = html;
}

// CS / LW slots
function renderPanelCSLW(filter){
    const body = document.getElementById('panelBody');
    const snap = _panelSlotsSnap;
    if(!snap || !snap.exists() || !snap.hasChildren()){
        body.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">No teams joined yet.</div>';
        document.getElementById('panelCount').textContent = '0';
        return;
    }
    const teams = { '1': null, '2': null };
    snap.forEach(slotSnap => {
        const s    = slotSnap.val();
        const tNum = String(s.teamNumber || slotSnap.key);
        if(tNum === '1' || tNum === '2') teams[tNum] = s;
    });

    const teamNums   = filter === 'team1' ? ['1'] : filter === 'team2' ? ['2'] : ['1','2'];
    let   totalSpots = 0, html = '';

    teamNums.forEach(tNum => {
        const s          = teams[tNum];
        const playersObj = (s && s.players) || {};
        const allSpots   = [];

        Object.entries(playersObj).forEach(([userId, pData]) => {
            if(!pData || typeof pData !== 'object') return;
            Object.entries(pData).forEach(([k, v]) => {
                if(/^s(\d+)$/.test(k) && v)
                    allSpots.push({ spot: parseInt(k.slice(1)), ign: v, userId });
            });
            const extras = pData.extraSpots || {};
            Object.entries(extras).forEach(([k, ign]) => {
                if(/^s(\d+)$/.test(k) && ign)
                    allSpots.push({ spot: parseInt(k.slice(1)), ign, userId });
            });
        });

        allSpots.sort((a, b) => a.spot - b.spot);
        totalSpots += allSpots.length;
        const uniqueUsers = [...new Set(allSpots.map(x => x.userId))];
        const multiUser   = uniqueUsers.length > 1;

        const rows = allSpots.length
            ? allSpots.map(({ spot, ign, userId }) => `
                <div class="fss-row">
                    <span class="fss-spot">S${spot}</span>
                    <span class="fss-ign">🎮 ${esc(ign)}</span>
                    <span class="fss-uid">${esc(userId)}</span>
                </div>`).join('')
            : `<div style="color:var(--muted);font-size:13px;padding:10px 14px;">No players joined yet</div>`;

        html += `
        <div class="fss-card">
            <div class="fss-header">
                <span class="fss-team-lbl">Team ${tNum}</span>
                <span class="fss-count">${allSpots.length} spot${allSpots.length!==1?'s':''} filled</span>
                ${multiUser ? `<span class="fss-multi">${uniqueUsers.length} joiners</span>` : ''}
            </div>
            <div class="fss-rows">${rows}</div>
        </div>`;
    });

    document.getElementById('panelCount').textContent = totalSpots + ' spot' + (totalSpots!==1?'s':'');
    body.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════════
// ── Results full-screen panel (completed tab only) ─────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
window.openResultsPanel = function(firebaseKey){
    const m = allMatches[firebaseKey];
    if(!m){ toast('Match not found','error'); return; }
    _resCurMatchId = firebaseKey;
    _resCurMatch   = m;
    _resActiveTab  = 'results';

    document.getElementById('resPanelTitle').textContent = `🏆 ${m.title||m.matchId}`;
    document.getElementById('resPanelSub').textContent   = `#${m.matchId} · ${m.matchType||''} ${m.entryType||''}`;
    document.getElementById('resPanelBody').innerHTML    = '<div style="text-align:center;padding:60px;color:var(--muted);">Loading…</div>';
    document.getElementById('resPanelCount').textContent = '…';

    // set active tab indicator
    document.getElementById('resTab-results').classList.add('active');
    document.getElementById('resTab-players').classList.remove('active');

    document.getElementById('resultsPanel').classList.add('show');
    document.body.style.overflow = 'hidden';

    loadResultsTab();
};

window.closeResultsPanel = function(){
    document.getElementById('resultsPanel').classList.remove('show');
    document.body.style.overflow = '';
};

window.resSwitchTab = function(tab){
    _resActiveTab = tab;
    document.getElementById('resTab-results').classList.toggle('active', tab === 'results');
    document.getElementById('resTab-players').classList.toggle('active', tab === 'players');
    if(tab === 'results') loadResultsTab();
    else                  loadResultsPlayersTab();
};

// ── Winners / Results tab ─────────────────────────────────────────────────────
function loadResultsTab(){
    const body = document.getElementById('resPanelBody');
    const m    = _resCurMatch;
    if(!m){ body.innerHTML = '<div class="res-empty"><i class="fas fa-exclamation-circle"></i><p>Match data not available.</p></div>'; return; }

    // Prize summary header
    let prizeChipsHtml = '';
    if(m.prizeType === 'kill' && m.perKillGold){
        prizeChipsHtml = `<div class="res-prize-chip kill-chip"><i class="fas fa-crosshairs"></i><div><div class="res-prize-chip-label">Per Kill</div><div class="res-prize-chip-val">${m.perKillGold} Gold</div></div></div>`;
    } else if(m.prizeType === 'rank' && m.rankPrizes?.length){
        prizeChipsHtml = (m.rankPrizes||[]).map(p => `
            <div class="res-prize-chip rank-chip">
                <i class="fas fa-trophy"></i>
                <div>
                    <div class="res-prize-chip-label">Rank #${p.rank}</div>
                    <div class="res-prize-chip-val">${p.gold} Gold</div>
                </div>
            </div>`).join('');
    } else if(m.prizeType === 'winner_only' && m.winnerPrizePool){
        prizeChipsHtml = `<div class="res-prize-chip winner-chip"><i class="fas fa-crown"></i><div><div class="res-prize-chip-label">Winner Pool</div><div class="res-prize-chip-val">${m.winnerPrizePool} Gold</div></div></div>`;
    }

    const summaryHtml = prizeChipsHtml ? `
        <div class="res-summary">
            <div class="res-summary-title"><i class="fas fa-gift" style="color:var(--gold);font-size:11px;"></i> Prize Structure</div>
            <div class="res-prize-chips">${prizeChipsHtml}</div>
        </div>` : '';

    // Load results from Firebase
    db.ref(`matches/${m.matchId}/results`).once('value', snap => {
        const bodyEl = document.getElementById('resPanelBody');
        if(!snap || !snap.exists() || !snap.hasChildren()){
            bodyEl.innerHTML = summaryHtml + `
                <div class="res-empty">
                    <i class="fas fa-inbox"></i>
                    <p>No results submitted for this match yet.</p>
                </div>`;
            document.getElementById('resPanelCount').textContent = '0 winners';
            return;
        }

        // collect and sort by rank asc, then by goldAwarded desc
        const results = [];
        snap.forEach(child => results.push({ _key: child.key, ...child.val() }));
        results.sort((a, b) => {
            if(a.rank !== b.rank) return (a.rank||999) - (b.rank||999);
            return (b.goldAwarded||0) - (a.goldAwarded||0);
        });

        document.getElementById('resPanelCount').textContent = results.length + ' entr' + (results.length!==1?'ies':'y');

        const rows = results.map(r => {
            const rank       = r.rank || 0;
            const isWinner   = rank === 1;
            const rankClass  = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
            const rankLabel  = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank||'—'}`;
            const spotsLabel = r.spots ? `<span class="res-spots-badge">${r.spots} spot${r.spots!==1?'s':''}</span>` : '';
            return `
            <div class="res-row${isWinner?' is-winner':''}">
                <div class="res-rank ${rankClass}">${rankLabel}</div>
                <div class="res-info">
                    <div class="res-name">🎮 ${esc(r.displayName||'—')}</div>
                    <div class="res-uid">${esc(r.userId||'—')}</div>
                </div>
                <div class="res-stats">
                    ${r.goldAwarded ? `<div class="res-gold"><i class="fas fa-coins"></i> ${r.goldAwarded}G</div>` : ''}
                    ${r.kills       ? `<div class="res-kills"><i class="fas fa-crosshairs"></i> ${r.kills} kills</div>` : ''}
                    ${spotsLabel}
                </div>
            </div>`;
        }).join('');

        bodyEl.innerHTML = summaryHtml + rows;
    });
}

// ── All Players tab (within results panel) ────────────────────────────────────
function loadResultsPlayersTab(){
    const body = document.getElementById('resPanelBody');
    const m    = _resCurMatch;
    if(!m){ return; }

    body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">Loading players…</div>';
    document.getElementById('resPanelCount').textContent = '…';

    const isSolo   = (m.entryType||'').toLowerCase() === 'solo';
    const isCSorLW = m.matchType === 'CS' || m.matchType === 'LW';

    if(isCSorLW){
        db.ref(`matches/${m.matchId}/slots`).once('value', snap => {
            if(!snap || !snap.exists() || !snap.hasChildren()){
                document.getElementById('resPanelBody').innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">No slot data found.</div>';
                document.getElementById('resPanelCount').textContent = '0';
                return;
            }
            _panelSlotsSnap = snap;
            // reuse the CS/LW renderer but output to resPanelBody
            renderResultsPanelCSLW(snap);
        });
    } else if(isSolo){
        db.ref(`matches/${m.matchId}/players`).once('value', snap => {
            renderResultsPanelSolo(snap);
        });
    } else {
        db.ref(`matches/${m.matchId}/teams`).once('value', snap => {
            renderResultsPanelBR(snap);
        });
    }
}

function renderResultsPanelSolo(snap){
    const body = document.getElementById('resPanelBody');
    if(!snap || !snap.exists() || !snap.hasChildren()){
        body.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">No players found.</div>';
        document.getElementById('resPanelCount').textContent = '0';
        return;
    }
    const players = []; snap.forEach(c => players.push(c.val()));
    document.getElementById('resPanelCount').textContent = players.length + ' player' + (players.length!==1?'s':'');
    body.innerHTML = players.map((p, i) => `
        <div class="fsp-item">
            <div class="fsp-num">${i+1}</div>
            <div class="fsp-avatar">${(p.inGameName||'?').charAt(0).toUpperCase()}</div>
            <div class="fsp-info">
                <div class="fsp-ign">🎮 ${esc(p.inGameName||'—')}</div>
                <div class="fsp-uid"><span class="fsp-uid-lbl">UID</span> ${esc(p.userId||'—')}</div>
            </div>
        </div>`).join('');
}

function renderResultsPanelBR(snap){
    const body = document.getElementById('resPanelBody');
    if(!snap || !snap.exists() || !snap.hasChildren()){
        body.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">No teams found.</div>';
        document.getElementById('resPanelCount').textContent = '0';
        return;
    }
    let html = '', totalPlayers = 0;
    snap.forEach(child => {
        const t        = child.val();
        const tKey     = child.key;
        const tName    = t.teamName || 'Unnamed Team';
        const leaderId = t.leaderId || '—';
        const members  = t.members  || {};
        const spots    = Object.keys(members).sort((a,b) => Number(a) - Number(b));
        totalPlayers  += spots.length;
        const memberRows = spots.map(sn => `
            <div class="fst-member-row">
                <span class="fst-spot">P${sn}</span>
                <span class="fst-ign">🎮 ${esc(members[sn]||'—')}</span>
                ${sn === '1'
                    ? `<span class="fst-uid">${esc(leaderId)}</span>`
                    : `<span style="font-size:10px;color:var(--muted);padding:2px 8px;flex-shrink:0;">member</span>`}
            </div>`).join('');
        html += `
        <div class="fst-card">
            <div class="fst-header">
                <span class="fst-num">Team #${esc(tKey)}</span>
                <span class="fst-name">${esc(tName)}</span>
                <span class="fst-leader" title="Leader UID">${esc(leaderId)}</span>
            </div>
            <div class="fst-members">${memberRows || '<div style="padding:10px;color:var(--muted);font-size:13px;">No members</div>'}</div>
        </div>`;
    });
    document.getElementById('resPanelCount').textContent = totalPlayers + ' players';
    body.innerHTML = html;
}

function renderResultsPanelCSLW(snap){
    const body = document.getElementById('resPanelBody');
    const teams = { '1': null, '2': null };
    snap.forEach(slotSnap => {
        const s    = slotSnap.val();
        const tNum = String(s.teamNumber || slotSnap.key);
        if(tNum === '1' || tNum === '2') teams[tNum] = s;
    });
    let totalSpots = 0, html = '';
    ['1','2'].forEach(tNum => {
        const s          = teams[tNum];
        const playersObj = (s && s.players) || {};
        const allSpots   = [];
        Object.entries(playersObj).forEach(([userId, pData]) => {
            if(!pData || typeof pData !== 'object') return;
            Object.entries(pData).forEach(([k, v]) => {
                if(/^s(\d+)$/.test(k) && v) allSpots.push({ spot: parseInt(k.slice(1)), ign: v, userId });
            });
            const extras = pData.extraSpots || {};
            Object.entries(extras).forEach(([k, ign]) => {
                if(/^s(\d+)$/.test(k) && ign) allSpots.push({ spot: parseInt(k.slice(1)), ign, userId });
            });
        });
        allSpots.sort((a, b) => a.spot - b.spot);
        totalSpots += allSpots.length;
        const uniqueUsers = [...new Set(allSpots.map(x => x.userId))];
        const rows = allSpots.length
            ? allSpots.map(({ spot, ign, userId }) => `
                <div class="fss-row">
                    <span class="fss-spot">S${spot}</span>
                    <span class="fss-ign">🎮 ${esc(ign)}</span>
                    <span class="fss-uid">${esc(userId)}</span>
                </div>`).join('')
            : `<div style="color:var(--muted);font-size:13px;padding:10px 14px;">No players joined yet</div>`;
        html += `
        <div class="fss-card">
            <div class="fss-header">
                <span class="fss-team-lbl">Team ${tNum}</span>
                <span class="fss-count">${allSpots.length} spot${allSpots.length!==1?'s':''} filled</span>
                ${uniqueUsers.length>1?`<span class="fss-multi">${uniqueUsers.length} joiners</span>`:''}
            </div>
            <div class="fss-rows">${rows}</div>
        </div>`;
    });
    document.getElementById('resPanelCount').textContent = totalSpots + ' spot' + (totalSpots!==1?'s':'');
    body.innerHTML = html;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function fmtDate(date, time){
    try{ return new Date(date+'T'+(time||'00:00')).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'}); }
    catch(_){ return date+' '+time; }
}

let _tt;
function toast(msg, type){
    clearTimeout(_tt);
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast '+type+' show';
    _tt = setTimeout(() => el.classList.remove('show'), 3200);
}

})();
</script>
